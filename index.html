<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>3D Brain WebGL Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 16px;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        #header-panel {
            max-width: 400px;
        }
        #header-panel h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #sub-details {
            margin: 6px 0 0 0;
            font-size: 12px;
            color: #bbbbbb;
        }
        #meta-details {
            margin: 4px 0 0 0;
            font-size: 11px;
            color: #777777;
            font-family: monospace;
        }
        #legend-panel {
            position: absolute;
            right: 24px;
            top: 24px;
            width: 70px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .legend-title {
            font-size: 10px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .legend-bar {
            flex-grow: 1;
            width: 16px;
            border-radius: 2px;
            border: 1px solid #333;
        }
        #control-panel {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 16px;
            box-sizing: border-box;
        }
        .btn {
            background: #222222;
            border: 1px solid #444444;
            color: #ffffff;
            border-radius: 4px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
            outline: none;
        }
        .btn:hover {
            background: #ff7e5f;
            border-color: #ff7e5f;
            color: #050505;
        }
        #play-btn {
            min-width: 80px;
        }
        #slider {
            flex-grow: 1;
            accent-color: #ff7e5f;
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        #frame-lbl {
            font-family: monospace;
            font-size: 12px;
            min-width: 80px;
            text-align: center;
            color: #ff7e5f;
            background: rgba(255, 126, 95, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 126, 95, 0.2);
        }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 126, 95, 0.1);
            border-top: 3px solid #ff7e5f;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loading p {
            margin-top: 20px;
            font-size: 14px;
            color: #aaaaaa;
            letter-spacing: 1px;
        }
        #drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s ease;
        }
        #drop-zone.dragover {
            background: rgba(15, 15, 15, 0.95);
            border: 2px dashed #ff7e5f;
        }
    </style>
</head>
<body>
    <div id="loading" style="display: none;">
        <div class="spinner"></div>
        <p id="loading-text">DECOMPRESSING fMRI VOXEL DATA...</p>
    </div>

    <div id="drop-zone">
        <div style="text-align: center; max-width: 400px; padding: 40px; border: 2px dashed #444444; border-radius: 12px; background: rgba(15,15,15,0.9); box-shadow: 0 4px 30px rgba(0,0,0,0.8);">
            <div style="font-size: 48px; margin-bottom: 20px;">🧠</div>
            <h3 style="margin: 0 0 10px 0; color: #ff7e5f;">3D Brain WebGL Visualizer</h3>
            <p style="margin: 0 0 20px 0; font-size: 13px; color: #888888; line-height: 1.5;">Drag and drop a <strong>.bin</strong> voxel data file here, or click to select from your computer.</p>
            <input type="file" id="file-input" accept=".bin" style="display: none;">
            <button class="btn" onclick="document.getElementById('file-input').click()">Select Voxel File</button>
        </div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div id="ui-overlay">
        <div class="panel" id="header-panel">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2>3D Brain fMRI WebGL</h2>
                    <p id="sub-details">Select a voxel data file to begin...</p>
                    <p id="meta-details"></p>
                </div>
                <button class="btn" id="load-file-btn" style="padding: 6px 10px; font-size: 11px; margin-left: 10px;">Load File</button>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px; border-top: 1px solid #222222; padding-top: 8px; pointer-events: auto;">
                <span style="font-size: 11px; color: #888888; min-width: 60px; font-weight: 600;">OPACITY:</span>
                <input type="range" id="opacity-slider" min="0.05" max="1.0" step="0.05" value="0.20" style="width: 100px; accent-color: #ff7e5f; cursor: pointer;">
                <span id="opacity-lbl" style="font-family: monospace; font-size: 11px; color: #ff7e5f; font-weight: bold;">0.20</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 6px; pointer-events: auto;">
                <span style="font-size: 11px; color: #888888; min-width: 60px; font-weight: 600;">PT SIZE:</span>
                <input type="range" id="size-slider" min="1.0" max="10.0" step="0.5" value="3.5" style="width: 100px; accent-color: #ff7e5f; cursor: pointer;">
                <span id="size-lbl" style="font-family: monospace; font-size: 11px; color: #ff7e5f; font-weight: bold;">3.5</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 6px; pointer-events: auto;">
                <span style="font-size: 11px; color: #888888; min-width: 60px; font-weight: 600;">THRESHOLD:</span>
                <input type="range" id="threshold-slider" min="15" max="95" step="5" value="75" style="width: 100px; accent-color: #ff7e5f; cursor: pointer;">
                <span id="threshold-lbl" style="font-family: monospace; font-size: 11px; color: #ff7e5f; font-weight: bold;">75%</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 6px; pointer-events: auto;">
                <span style="font-size: 11px; color: #888888; min-width: 60px; font-weight: 600;">BRAIN SHELL:</span>
                <input type="checkbox" id="shell-checkbox" checked style="accent-color: #ff7e5f; cursor: pointer;">
                <span style="font-size: 11px; color: #ff7e5f; font-weight: bold;">ON</span>
            </div>
        </div>
        
        <div class="panel" id="legend-panel">
            <div class="legend-title" id="legend-max">Max</div>
            <div class="legend-bar" id="legend-bar-gradient"></div>
            <div class="legend-title" id="legend-min" style="margin-top: 6px; margin-bottom: 0;">Min</div>
        </div>
        
        <div class="panel" id="control-panel">
            <button class="btn" id="play-btn">Play</button>
            <span id="frame-lbl">Frame: 1/1</span>
            <input type="range" id="slider" min="0" max="0" value="0">
            <span style="font-size: 11px; color: #888888; font-weight: 600;">SPEED:</span>
            <select id="fps-select" class="btn" style="padding: 6px 12px; cursor: pointer;">
                <option value="2">2 FPS</option>
                <option value="5" selected>5 FPS</option>
                <option value="10">10 FPS</option>
                <option value="15">15 FPS</option>
                <option value="30">30 FPS</option>
            </select>
        </div>
    </div>

    <script>
        // Parse dataParam and dynamic URLs
        const params = new URLSearchParams(window.location.search);
        const dataParam = params.get('data') || 'brain_data';
        const jsUrl = dataParam + '.js';
        const binUrl = dataParam + '.bin';

        let x, y, z, values;
        let originalX, originalY, originalZ, originalValues, originalNumActive;
        let scene, camera, renderer, controls, pointsMesh, material, shellMesh;
        let currentFrame = 0;
        let isPlaying = false;
        let playInterval = null;
        let colormap = [];
        let colormapR = new Float32Array(256);
        let colormapG = new Float32Array(256);
        let colormapB = new Float32Array(256);
        let fmriColorIndexMap = new Uint8Array(256);
        let activeMetadata = null;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loadFileBtn = document.getElementById('load-file-btn');

        // Colorscale Control Points
        const magmaPoints = [
            { pct: 0.0, r: 5,   g: 4,   b: 15 },
            { pct: 0.2, r: 80,  g: 15,  b: 80 },
            { pct: 0.45, r: 180, g: 40,  b: 80 },
            { pct: 0.7, r: 250, g: 110, b: 30 },
            { pct: 0.9, r: 253, g: 200, b: 90 },
            { pct: 1.0, r: 255, g: 255, b: 255 }
        ];

        const hotPoints = [
            { pct: 0.0, r: 0,   g: 0,   b: 0 },
            { pct: 0.3, r: 230, g: 0,   b: 0 },
            { pct: 0.65, r: 255, g: 200, b: 0 },
            { pct: 1.0, r: 255, g: 255, b: 255 }
        ];

        const jetPoints = [
            { pct: 0.0, r: 0,   g: 0,   b: 128 },
            { pct: 0.15, r: 0,   g: 0,   b: 255 },
            { pct: 0.35, r: 0,   g: 255, b: 255 },
            { pct: 0.55, r: 0,   g: 255, b: 0 },
            { pct: 0.75, r: 255, g: 255, b: 0 },
            { pct: 0.9, r: 255, g: 0,   b: 0 },
            { pct: 1.0, r: 128, g: 0,   b: 0 }
        ];

        const viridisPoints = [
            { pct: 0.0, r: 68,  g: 1,   b: 84 },
            { pct: 0.25, r: 59,  g: 82,  b: 139 },
            { pct: 0.5, r: 33,  g: 144, b: 141 },
            { pct: 0.75, r: 94,  g: 201, b: 98 },
            { pct: 1.0, r: 253, g: 231, b: 37 }
        ];

        function createColormap(points) {
            const map = [];
            for (let i = 0; i < 256; i++) {
                const pct = i / 255;
                let idx = 0;
                while (idx < points.length - 1 && points[idx+1].pct < pct) {
                    idx++;
                }
                const p1 = points[idx];
                const p2 = points[idx+1];
                const w = (pct - p1.pct) / (p2.pct - p1.pct);
                const r = Math.round(p1.r + (p2.r - p1.r) * w);
                const g = Math.round(p1.g + (p2.g - p1.g) * w);
                const b = Math.round(p1.b + (p2.b - p1.b) * w);
                map.push(new THREE.Color(`rgb(${r},${g},${b})`));
            }
            return map;
        }

        function setupLegendGradient(points) {
            const bar = document.getElementById('legend-bar-gradient');
            const gradientString = points.map(p => `rgb(${p.r},${p.g},${p.b}) ${p.pct*100}%`).join(', ');
            bar.style.background = `linear-gradient(0deg, ${gradientString})`;
        }

        async function decompressData(arrayBuffer) {
            const ds = new DecompressionStream('gzip');
            const blob = new Blob([arrayBuffer]);
            const decompressedStream = blob.stream().pipeThrough(ds);
            const buffer = await new Response(decompressedStream).arrayBuffer();
            return buffer;
        }

        function loadBufferData(decompressedBuffer) {
            const uint8Array = new Uint8Array(decompressedBuffer);
            
            // 1. Check Magic bytes
            const magic = String.fromCharCode(...uint8Array.subarray(0, 8));
            if (!magic.startsWith("BRAIN3D")) {
                throw new Error("Invalid file format (magic bytes mismatch)");
            }

            // 2. Read metadata length
            const view = new DataView(decompressedBuffer, 8, 4);
            const metadataLen = view.getUint32(0, true);

            // 3. Read metadata JSON
            const metadataBytes = uint8Array.subarray(12, 12 + metadataLen);
            const metadataStr = new TextDecoder('utf-8').decode(metadataBytes);
            const meta = JSON.parse(metadataStr);
            activeMetadata = meta;

            // 4. Extract arrays (aligned offset to 4-byte boundary)
            const dataOffset = 12 + metadataLen;
            const paddedOffset = Math.ceil(dataOffset / 4) * 4;

            originalNumActive = meta.num_active;
            const nFrames = meta.shape[0];

            originalX = new Float32Array(decompressedBuffer, paddedOffset, originalNumActive);
            originalY = new Float32Array(decompressedBuffer, paddedOffset + originalNumActive * 4, originalNumActive);
            originalZ = new Float32Array(decompressedBuffer, paddedOffset + originalNumActive * 8, originalNumActive);
            originalValues = new Uint8Array(decompressedBuffer, paddedOffset + originalNumActive * 12, originalNumActive * nFrames);

            // Clean up existing shell mesh
            if (shellMesh) {
                scene.remove(shellMesh);
                shellMesh.geometry.dispose();
                shellMesh.material.dispose();
                shellMesh = null;
            }

            // 5. Generate Brain Boundary Shell
            let minX = originalX[0], minY = originalY[0], minZ = originalZ[0];
            for (let i = 1; i < originalNumActive; i++) {
                if (originalX[i] < minX) minX = originalX[i];
                if (originalY[i] < minY) minY = originalY[i];
                if (originalZ[i] < minZ) minZ = originalZ[i];
            }

            const nx = meta.shape[1];
            const ny = meta.shape[2];
            const nz = meta.shape[3];
            const zoomX = meta.zooms[0];
            const zoomY = meta.zooms[1];
            const zoomZ = meta.zooms[2];

            const grid = new Int32Array(nx * ny * nz);
            const voxelGridCoords = new Int32Array(originalNumActive * 3);

            for (let p = 0; p < originalNumActive; p++) {
                const i = Math.round(Math.abs(originalX[p] - minX) / zoomX);
                const j = Math.round(Math.abs(originalY[p] - minY) / zoomY);
                const k = Math.round(Math.abs(originalZ[p] - minZ) / zoomZ);
                
                voxelGridCoords[p * 3] = i;
                voxelGridCoords[p * 3 + 1] = j;
                voxelGridCoords[p * 3 + 2] = k;

                if (i >= 0 && i < nx && j >= 0 && j < ny && k >= 0 && k < nz) {
                    grid[i * ny * nz + j * nz + k] = p + 1;
                }
            }

            const isBoundary = new Uint8Array(originalNumActive);
            for (let p = 0; p < originalNumActive; p++) {
                const i = voxelGridCoords[p * 3];
                const j = voxelGridCoords[p * 3 + 1];
                const k = voxelGridCoords[p * 3 + 2];

                if (i <= 0 || i >= nx - 1 || j <= 0 || j >= ny - 1 || k <= 0 || k >= nz - 1) {
                    isBoundary[p] = 1;
                    continue;
                }

                const n1 = grid[(i + 1) * ny * nz + j * nz + k];
                const n2 = grid[(i - 1) * ny * nz + j * nz + k];
                const n3 = grid[i * ny * nz + (j + 1) * nz + k];
                const n4 = grid[i * ny * nz + (j - 1) * nz + k];
                const n5 = grid[i * ny * nz + j * nz + (k + 1)];
                const n6 = grid[i * ny * nz + j * nz + (k - 1)];

                if (!n1 || !n2 || !n3 || !n4 || !n5 || !n6) {
                    isBoundary[p] = 1;
                }
            }

            // Find all line segments connecting adjacent boundary voxels
            const linePositions = [];
            for (let p = 0; p < originalNumActive; p++) {
                if (!isBoundary[p]) continue;

                const i = voxelGridCoords[p * 3];
                const j = voxelGridCoords[p * 3 + 1];
                const k = voxelGridCoords[p * 3 + 2];

                // Check positive neighbor directions
                const checkNeighbors = [
                    {di: 1, dj: 0, dk: 0},
                    {di: 0, dj: 1, dk: 0},
                    {di: 0, dj: 0, dk: 1}
                ];

                for (let o = 0; o < checkNeighbors.length; o++) {
                    const offset = checkNeighbors[o];
                    const ni = i + offset.di;
                    const nj = j + offset.dj;
                    const nk = k + offset.dk;

                    if (ni < nx && nj < ny && nk < nz) {
                        const neighborVal = grid[ni * ny * nz + nj * nz + nk];
                        if (neighborVal > 0) {
                            const neighborIdx = neighborVal - 1;
                            if (isBoundary[neighborIdx]) {
                                linePositions.push(originalX[p], originalY[p], originalZ[p]);
                                linePositions.push(originalX[neighborIdx], originalY[neighborIdx], originalZ[neighborIdx]);
                            }
                        }
                    }
                }
            }

            const shellGeometry = new THREE.BufferGeometry();
            shellGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

            const shellMaterial = new THREE.LineBasicMaterial({
                color: 0x666666,
                transparent: true,
                opacity: 0.25,
                depthWrite: false
            });
            shellMesh = new THREE.LineSegments(shellGeometry, shellMaterial);
            shellMesh.visible = document.getElementById('shell-checkbox').checked;
            scene.add(shellMesh);
            console.log("Generated line shell outline with " + (linePositions.length / 6) + " segments.");

            // 6. Configure Threshold Slider and Legend Labels
            const thresholdSlider = document.getElementById('threshold-slider');
            const thresholdLbl = document.getElementById('threshold-lbl');
            const thresholdTitle = thresholdSlider.previousElementSibling;
            
            if (meta.scan_type === "fmri") {
                thresholdTitle.innerText = "Z-THRESH:";
                thresholdSlider.min = "0.0";
                thresholdSlider.max = "6.0";
                thresholdSlider.step = "0.2";
                thresholdSlider.value = "2.0"; // Default threshold: 2.0 SD
                thresholdLbl.innerText = "2.0 SD";
                
                document.getElementById('legend-max').innerText = `+${meta.v_max.toFixed(1)} σ`;
                document.getElementById('legend-min').innerText = `0.0 σ`;
            } else {
                thresholdTitle.innerText = "THRESHOLD:";
                thresholdSlider.min = "5";
                thresholdSlider.max = "95";
                thresholdSlider.step = "5";
                thresholdSlider.value = "15"; // Default structural threshold: 15%
                thresholdLbl.innerText = "15%";
                
                document.getElementById('legend-max').innerText = "Max";
                document.getElementById('legend-min').innerText = "Min";
            }

            const defaultThresh = parseFloat(thresholdSlider.value);
            applyThresholdAndRender(defaultThresh);
        }

        function applyThresholdAndRender(sliderValue) {
            if (!activeMetadata) return;
            const nFrames = activeMetadata.shape[0];
            
            let threshPhysical;
            if (activeMetadata.scan_type === "fmri") {
                threshPhysical = sliderValue; // Directly standard deviations
            } else {
                threshPhysical = (sliderValue / 100) * activeMetadata.v_max;
            }
            
            const threshScaled = Math.max(0, Math.min(255, Math.round(((threshPhysical - activeMetadata.v_min) / (activeMetadata.v_max - activeMetadata.v_min)) * 255)));

            // Identify voxels that exceed the threshold in at least one timeframe
            const keepIndices = [];
            for (let i = 0; i < originalNumActive; i++) {
                let keep = false;
                for (let t = 0; t < nFrames; t++) {
                    if (originalValues[t * originalNumActive + i] >= threshScaled) {
                        keep = true;
                        break;
                    }
                }
                if (keep) {
                    keepIndices.push(i);
                }
            }

            const numFiltered = keepIndices.length;
            console.log(`Threshold filter (${sliderValue}): Kept ${numFiltered} / ${originalNumActive} voxels`);

            x = new Float32Array(numFiltered);
            y = new Float32Array(numFiltered);
            z = new Float32Array(numFiltered);
            values = new Uint8Array(numFiltered * nFrames);

            for (let newIdx = 0; newIdx < numFiltered; newIdx++) {
                const oldIdx = keepIndices[newIdx];
                x[newIdx] = originalX[oldIdx];
                y[newIdx] = originalY[oldIdx];
                z[newIdx] = originalZ[oldIdx];
                for (let t = 0; t < nFrames; t++) {
                    values[t * numFiltered + newIdx] = originalValues[t * originalNumActive + oldIdx];
                }
            }

            activeMetadata.num_active = numFiltered;
            setupSceneWithData(activeMetadata);
        }

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        function setupSceneWithData(meta) {
            if (pointsMesh) {
                scene.remove(pointsMesh);
                pointsMesh.geometry.dispose();
                if (material) material.dispose();
                pointsMesh = null;
            }

            // Choose colormap
            let pts = magmaPoints;
            if (meta.colorscale === "hot") pts = hotPoints;
            else if (meta.colorscale === "jet") pts = jetPoints;
            else if (meta.colorscale === "viridis") pts = viridisPoints;
            colormap = createColormap(pts);
            setupLegendGradient(pts);

            // Pre-populate flat colormap arrays for high-performance direct buffer writes
            for (let i = 0; i < 256; i++) {
                colormapR[i] = colormap[i].r;
                colormapG[i] = colormap[i].g;
                colormapB[i] = colormap[i].b;
            }

            if (meta.scan_type === "fmri") {
                for (let valUint8 = 0; valUint8 < 256; valUint8++) {
                    const z = meta.v_min + (valUint8 / 255.0) * (meta.v_max - meta.v_min);
                    // Map positive z-scores from 0.0 to meta.v_max to the colormap range [0, 255]
                    const colorIndex = Math.max(0, Math.min(255, Math.round((z / meta.v_max) * 255.0)));
                    fmriColorIndexMap[valUint8] = colorIndex;
                }
            }

            const numActive = meta.num_active;
            
            // Build BufferGeometry for Points
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(numActive * 3);
            const colors = new Float32Array(numActive * 3);

            let sumX = 0, sumY = 0, sumZ = 0;
            for (let i = 0; i < numActive; i++) {
                positions[i * 3] = x[i];
                positions[i * 3 + 1] = y[i];
                positions[i * 3 + 2] = z[i];

                sumX += x[i];
                sumY += y[i];
                sumZ += z[i];
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Set opacity and point size from sliders
            const opVal = parseFloat(document.getElementById('opacity-slider').value);
            const ptSize = parseFloat(document.getElementById('size-slider').value);
            
            material = new THREE.PointsMaterial({
                size: ptSize,
                sizeAttenuation: true,
                vertexColors: true,
                transparent: true,
                opacity: opVal,
                depthWrite: false,
                map: createCircleTexture(),
                blending: THREE.AdditiveBlending
            });

            pointsMesh = new THREE.Points(geometry, material);
            scene.add(pointsMesh);

            // Center camera rotation target on the brain
            const centerX = sumX / numActive;
            const centerY = sumY / numActive;
            const centerZ = sumZ / numActive;
            controls.target.set(centerX, centerY, centerZ);
            camera.position.set(centerX, centerY - 180, centerZ + 220);
            controls.update();

            // Populate text elements
            if (meta.scan_type === "fmri") {
                document.getElementById('sub-details').innerHTML = 
                    `Subject: <strong>${meta.subject_id}</strong> | Native TR: <strong>${meta.tr}s</strong> (Resampled to 2.0s/frame, ${meta.shape[0]} frames)`;
            } else {
                document.getElementById('sub-details').innerHTML = 
                    `Subject: <strong>${meta.subject_id}</strong> | Structural MRI (T1w) 3D Scan`;
            }
            document.getElementById('meta-details').innerHTML = 
                `Grid: ${meta.shape[1]}x${meta.shape[2]}x${meta.shape[3]} | Active Voxels: ${numActive.toLocaleString()}`;

            // Reset playback variables
            currentFrame = 0;
            const slider = document.getElementById('slider');
            slider.max = meta.shape[0] - 1;
            slider.value = 0;

            // Render first frame
            updateFrame(0);

            // Hide loading screen
            const loader = document.getElementById('loading');
            loader.style.opacity = 0;
            setTimeout(() => loader.style.display = 'none', 500);
        }

        function updateFrame(t) {
            if (!activeMetadata || !pointsMesh) return;
            
            currentFrame = t;
            const nFrames = activeMetadata.shape[0];
            document.getElementById('frame-lbl').innerText = `Frame: ${t + 1}/${nFrames}`;
            document.getElementById('slider').value = t;

            const positionArray = pointsMesh.geometry.attributes.position.array;
            const colorArray = pointsMesh.geometry.attributes.color.array;
            
            const numActive = activeMetadata.num_active;
            
            // Get current slider threshold
            const thresholdSlider = document.getElementById('threshold-slider');
            const sliderValue = parseFloat(thresholdSlider.value);
            
            let threshPhysical;
            if (activeMetadata.scan_type === "fmri") {
                threshPhysical = sliderValue; // Directly standard deviations
            } else {
                threshPhysical = (sliderValue / 100) * activeMetadata.v_max;
            }
            
            const vMinLocal = activeMetadata.v_min;
            const valScaleLocal = (activeMetadata.v_max - vMinLocal) / 255.0;

            // Pre-calculate the uint8 threshold once per frame to avoid float division in the loop
            const thresholdUint8 = Math.max(0, Math.min(255, Math.round((threshPhysical - vMinLocal) / valScaleLocal)));

            // Compute starting offset for sequential memory read of frame t
            const frameOffset = t * numActive;

            for (let i = 0; i < numActive; i++) {
                const pOffset = i * 3;
                const valUint8 = values[frameOffset + i];

                // Hide the point by moving it outside the frustum if below threshold
                if (valUint8 < thresholdUint8) {
                    positionArray[pOffset] = 99999;
                    positionArray[pOffset + 1] = 99999;
                    positionArray[pOffset + 2] = 99999;
                } else {
                    positionArray[pOffset] = x[i];
                    positionArray[pOffset + 1] = y[i];
                    positionArray[pOffset + 2] = z[i];
                }

                // Direct array writes from flat colormap pre-computed caches
                const cIdx = (activeMetadata.scan_type === "fmri") ? fmriColorIndexMap[valUint8] : valUint8;
                colorArray[pOffset] = colormapR[cIdx];
                colorArray[pOffset + 1] = colormapG[cIdx];
                colorArray[pOffset + 2] = colormapB[cIdx];
            }

            pointsMesh.geometry.attributes.position.needsUpdate = true;
            pointsMesh.geometry.attributes.color.needsUpdate = true;
        }

        async function handleFile(file) {
            dropZone.style.display = 'none';
            const loader = document.getElementById('loading');
            const loaderText = document.getElementById('loading-text');
            loader.style.display = 'flex';
            loader.style.opacity = 1;
            loaderText.innerText = `LOADING ${file.name.toUpperCase()}...`;

            try {
                const startTime = performance.now();
                const arrayBuffer = await file.arrayBuffer();
                const decompressedBuffer = await decompressData(arrayBuffer);
                
                loadBufferData(decompressedBuffer);
                
                console.log(`Loaded file in ${(performance.now() - startTime).toFixed(1)}ms`);
            } catch (err) {
                console.error("Error loading file:", err);
                loaderText.innerHTML = `<span style="color: #ff5555; font-weight: bold;">Load Failed: ${err.message}</span>`;
                setTimeout(() => {
                    loader.style.display = 'none';
                    dropZone.style.display = 'flex';
                }, 3000);
            }
        }

        async function loadFromBase64Var() {
            if (typeof BRAIN_DATA_B64 === 'undefined' || !BRAIN_DATA_B64) {
                throw new Error("BRAIN_DATA_B64 is not defined");
            }
            const binaryString = atob(BRAIN_DATA_B64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const decompressedBuffer = await decompressData(bytes.buffer);
            
            // Hide drop zone
            dropZone.style.display = 'none';
            loadBufferData(decompressedBuffer);
        }

        async function fetchDefaultData() {
            const loader = document.getElementById('loading');
            const loaderText = document.getElementById('loading-text');
            loader.style.display = 'flex';
            loader.style.opacity = 1;
            
            // 1. Try loading from preloaded JS variable (CORS-free local open)
            if (typeof BRAIN_DATA_B64 !== 'undefined' && BRAIN_DATA_B64) {
                loaderText.innerText = "LOADING PRELOADED VOXEL DATA...";
                try {
                    await loadFromBase64Var();
                    console.log("Loaded data successfully from preloaded JS variable.");
                    return;
                } catch (err) {
                    console.warn("Failed to load from preloaded JS variable:", err);
                }
            }
            
            // 2. Fallback to fetching bin file (for local/remote web servers)
            loaderText.innerText = `FETCHING DEFAULT DATA (${binUrl})...`;
            
            try {
                const response = await fetch(binUrl);
                if (!response.ok) throw new Error("File not found or CORS restricted");
                
                const arrayBuffer = await response.arrayBuffer();
                const decompressedBuffer = await decompressData(arrayBuffer);
                
                // Hide drop zone since default loaded successfully
                dropZone.style.display = 'none';
                loadBufferData(decompressedBuffer);
            } catch (err) {
                console.log("Default fetch failed (CORS/Not Found), waiting for drag-and-drop:", err.message);
                // Hide loader, show drop-zone
                loader.style.display = 'none';
                dropZone.style.display = 'flex';
            }
        }

        function setupUIControls() {
            const playBtn = document.getElementById('play-btn');
            const slider = document.getElementById('slider');
            const fpsSelect = document.getElementById('fps-select');
            const opacitySlider = document.getElementById('opacity-slider');
            const opacityLbl = document.getElementById('opacity-lbl');
            const sizeSlider = document.getElementById('size-slider');
            const sizeLbl = document.getElementById('size-lbl');
            const thresholdSlider = document.getElementById('threshold-slider');
            const thresholdLbl = document.getElementById('threshold-lbl');
            const shellCheckbox = document.getElementById('shell-checkbox');

            // Play/Pause button
            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    pause();
                } else {
                    play();
                }
            });

            // Shell visibility toggle
            shellCheckbox.addEventListener('change', (e) => {
                if (shellMesh) {
                    shellMesh.visible = e.target.checked;
                }
            });

            // Threshold slider listener
            thresholdSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                if (activeMetadata && activeMetadata.scan_type === "fmri") {
                    thresholdLbl.innerText = val.toFixed(1) + ' SD';
                } else {
                    thresholdLbl.innerText = Math.round(val) + '%';
                }
            });

            // Re-apply threshold on release
            thresholdSlider.addEventListener('change', (e) => {
                const val = parseFloat(e.target.value);
                applyThresholdAndRender(val);
            });

            // Timeline slider
            slider.addEventListener('input', (e) => {
                pause();
                updateFrame(parseInt(e.target.value));
            });

            // Speed selector
            fpsSelect.addEventListener('change', () => {
                if (isPlaying) {
                    pause();
                    play();
                }
            });

            // Opacity slider listener
            opacitySlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                opacityLbl.innerText = val.toFixed(2);
                if (material) {
                    material.opacity = val;
                }
            });

            // Point Size slider listener
            sizeSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                sizeLbl.innerText = val.toFixed(1);
                if (material) {
                    material.size = val;
                }
            });

            // Drag and drop event handlers
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.remove('dragover');
                }, false);
            });

            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            loadFileBtn.addEventListener('click', () => {
                pause();
                dropZone.style.display = 'flex';
            });

            window.addEventListener('resize', onWindowResize);
        }

        function play() {
            if (!activeMetadata) return;
            isPlaying = true;
            const playBtn = document.getElementById('play-btn');
            playBtn.innerText = 'Pause';
            playBtn.style.background = '#ff5555';
            playBtn.style.borderColor = '#ff5555';
            playBtn.style.color = '#ffffff';

            const fpsVal = parseInt(document.getElementById('fps-select').value);
            const intervalMs = 1000 / fpsVal;
            const nFrames = activeMetadata.shape[0];

            playInterval = setInterval(() => {
                let nextFrame = currentFrame + 1;
                if (nextFrame >= nFrames) {
                    nextFrame = 0;
                }
                updateFrame(nextFrame);
            }, intervalMs);
        }

        function pause() {
            isPlaying = false;
            const playBtn = document.getElementById('play-btn');
            playBtn.innerText = 'Play';
            playBtn.style.background = '#222222';
            playBtn.style.borderColor = '#444444';
            playBtn.style.color = '#ffffff';
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function init() {
            // Setup base Three.js scene (empty canvas)
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -180, 250);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const gridHelper = new THREE.GridHelper(300, 30, 0x1a1a1a, 0x111111);
            gridHelper.position.y = -80;
            scene.add(gridHelper);

            // Bind global controls and UI resize listeners
            setupUIControls();
            
            // Try fetching default data
            fetchDefaultData();

            // Run render loop
            animate();
        }

        // Dynamically load dataset JS script tag based on query param
        const script = document.createElement('script');
        script.src = jsUrl;
        script.onload = () => {
            init();
        };
        script.onerror = () => {
            init();
        };
        document.head.appendChild(script);
    </script>
</body>
